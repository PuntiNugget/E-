<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E# Language Playground - Interactive Edition</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        h1 { margin-top: 0; color: #f0db4f; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .panel-header { background: #3c3c3c; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        textarea { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; resize: none; outline: none; line-height: 1.4; }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; color: #a5d6ff; white-space: pre-wrap; }
        button { background: #f0db4f; color: #000; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #d6c23a; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        .error { color: #ff7b72; }
        .success { color: #7ee787; }
        .system { color: #8b949e; font-style: italic; }
        .highlight { color: #f0db4f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>E# Playground</h1>
    <p>Now featuring: Keyboard interactions!</p>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span>Program.e#</span>
                <button id="runBtn" onclick="startExecution()">Run Program</button>
            </div>
            <textarea id="editor" spellcheck="false">
print "Welcome to the E# Security System."
print "Please press the 'Enter' key to begin."

wait for key "Enter"

print "Access granted."
wait 1 second

print "Press 'y' to disarm the alarm or 'n' to trigger it."
// We can wait for any specific key you define
wait for key "y"

print "Alarm disarmed. Have a nice day!"
            </textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Terminal</div>
            <div id="console" tabindex="0"></div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // New helper function to listen for a key press
        function waitForKey(targetKey) {
            return new Promise(resolve => {
                const listener = (event) => {
                    // Check if the key pressed matches our target (case-insensitive)
                    if (event.key.toLowerCase() === targetKey.toLowerCase()) {
                        document.removeEventListener('keydown', listener); // Stop listening
                        resolve(); // Resume the E# program
                    }
                };
                document.addEventListener('keydown', listener);
            });
        }

        async function startExecution() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.innerText = "Running...";
            
            // Focus the console so keyboard events register cleanly
            document.getElementById('console').focus();
            
            await runESharp();
            
            runBtn.disabled = false;
            runBtn.innerText = "Run Program";
        }

        async function runESharp() {
            const code = document.getElementById('editor').value;
            const consoleOut = document.getElementById('console');
            consoleOut.innerHTML = '';
            
            let variables = {};
            let lines = code.split('\n');
            let ip = 0;

            function print(text, type = 'normal') {
                const span = document.createElement('div');
                span.textContent = text;
                if (type === 'error') span.className = 'error';
                if (type === 'system') span.className = 'system';
                if (type === 'success') span.className = 'success';
                if (type === 'highlight') span.className = 'highlight';
                consoleOut.appendChild(span);
                consoleOut.scrollTop = consoleOut.scrollHeight;
            }

            function getValue(valStr) {
                valStr = valStr.trim();
                if (valStr === "true") return true;
                if (valStr === "false") return false;
                if (!isNaN(valStr)) return Number(valStr);
                if (valStr.startsWith('"') && valStr.endsWith('"')) return valStr.substring(1, valStr.length - 1);
                if (variables[valStr] !== undefined) return variables[valStr].value;
                throw new Error(`Unknown variable or value: '${valStr}'`);
            }

            try {
                print("--- Program Running ---", 'system');

                while (ip < lines.length) {
                    let line = lines[ip].trim();
                    if (!line || line.startsWith('//')) { ip++; continue; }

                    // --- NEW: WAIT FOR KEY ---
                    let keyMatch = line.match(/^wait for key "(.+)"$/);
                    if (keyMatch) {
                        let targetKey = keyMatch[1];
                        print(`[System is waiting for you to press '${targetKey}']`, 'highlight');
                        await waitForKey(targetKey); // Program pauses here until key is pressed
                        ip++; continue;
                    }

                    // --- TIMERS ---
                    let waitMatch = line.match(/^wait (\d+) seconds?$/);
                    if (waitMatch) {
                        await sleep(Number(waitMatch[1]) * 1000);
                        ip++; continue;
                    }

                    // --- C# LOGIC (from previous steps) ---
                    let setMatch = line.match(/^set (number|string|boolean) (\w+) to (.+)$/);
                    if (setMatch) {
                        variables[setMatch[2]] = { type: setMatch[1], value: getValue(setMatch[3]) };
                        ip++; continue;
                    }

                    if (line.startsWith('print ')) {
                        print(getValue(line.substring(6)));
                        ip++; continue;
                    }

                    throw new Error(`Unrecognized command: '${line}'`);
                }
                
                print("--- Program Finished ---", 'system');
            } catch (err) {
                print(`Error on line ${ip + 1}: ${err.message}`, 'error');
            }
        }
    </script>
</body>
