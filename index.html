<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E# Language Playground - Input Edition</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        h1 { margin-top: 0; color: #ff9800; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .panel-header { background: #3c3c3c; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        textarea { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; resize: none; outline: none; line-height: 1.4; }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; color: #a5d6ff; white-space: pre-wrap; }
        button { background: #ff9800; color: #000; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e68a00; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        .error { color: #ff7b72; }
        .success { color: #7ee787; }
        .system { color: #8b949e; font-style: italic; }
        .highlight { color: #ff9800; font-weight: bold; }
    </style>
</head>
<body>

    <h1>E# Playground</h1>
    <p>Now featuring: User Prompts and Program Termination!</p>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span>Program.e#</span>
                <button id="runBtn" onclick="startExecution()">Run Program</button>
            </div>
            <textarea id="editor" spellcheck="false">
print "Initializing User Registration..."

// Ask the user for a string and a number
ask user for string userName with "What is your name?"
ask user for number userAge with "How old are you?"

print "Welcome to the system!"
print userName

if userAge is less than 18
    print "Access denied. You are too young."
    end program
end if

print "Access granted. Loading dashboard..."
wait 2 seconds

print "Logging out..."
end program
            </textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Terminal</div>
            <div id="console" tabindex="0"></div>
        </div>
    </div>

    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function waitForKey(targetKey) {
            return new Promise(resolve => {
                const listener = (event) => {
                    if (event.key.toLowerCase() === targetKey.toLowerCase()) {
                        document.removeEventListener('keydown', listener);
                        resolve();
                    }
                };
                document.addEventListener('keydown', listener);
            });
        }

        async function startExecution() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.innerText = "Running...";
            
            document.getElementById('console').focus();
            
            await runESharp();
            
            runBtn.disabled = false;
            runBtn.innerText = "Run Program";
        }

        async function runESharp() {
            const code = document.getElementById('editor').value;
            const consoleOut = document.getElementById('console');
            consoleOut.innerHTML = '';
            
            let variables = {};
            let lines = code.split('\n');
            let ip = 0;

            function print(text, type = 'normal') {
                const span = document.createElement('div');
                span.textContent = text;
                if (type === 'error') span.className = 'error';
                if (type === 'system') span.className = 'system';
                if (type === 'success') span.className = 'success';
                if (type === 'highlight') span.className = 'highlight';
                consoleOut.appendChild(span);
                consoleOut.scrollTop = consoleOut.scrollHeight;
            }

            function getValue(valStr) {
                valStr = valStr.trim();
                if (valStr === "true") return true;
                if (valStr === "false") return false;
                if (!isNaN(valStr)) return Number(valStr);
                if (valStr.startsWith('"') && valStr.endsWith('"')) return valStr.substring(1, valStr.length - 1);
                if (variables[valStr] !== undefined) return variables[valStr].value;
                throw new Error(`Unknown variable or value: '${valStr}'`);
            }

            try {
                print("--- Program Running ---", 'system');

                while (ip < lines.length) {
                    let line = lines[ip].trim();
                    if (!line || line.startsWith('//')) { ip++; continue; }

                    // --- NEW: END PROGRAM ---
                    if (line === "end program") {
                        print("--- Program Terminated by 'end program' ---", 'system');
                        window.close(); // Attempts to close the tab
                        print("[Browser Security Note: Scripts cannot close tabs they did not open.]", 'highlight');
                        return; // This completely stops the while loop and exits the interpreter
                    }

                    // --- NEW: USER PROMPTS ---
                    let askMatch = line.match(/^ask user for (string|number) (\w+) with "([^"]+)"$/);
                    if (askMatch) {
                        let type = askMatch[1];
                        let varName = askMatch[2];
                        let promptMessage = askMatch[3];

                        // Trigger the browser's native prompt
                        let userInput = window.prompt(promptMessage);

                        if (userInput === null) {
                            throw new Error("User cancelled the input prompt.");
                        }

                        // Type checking
                        if (type === 'number') {
                            let numVal = Number(userInput);
                            if (isNaN(numVal) || userInput.trim() === "") {
                                throw new Error(`Expected a number for '${varName}', but got '${userInput}'.`);
                            }
                            variables[varName] = { type: 'number', value: numVal };
                        } else {
                            variables[varName] = { type: 'string', value: userInput };
                        }
                        
                        ip++; continue;
                    }

                    // --- PREVIOUS FEATURES (Wait for key, Timers, Variables, If, Print) ---
                    let keyMatch = line.match(/^wait for key "(.+)"$/);
                    if (keyMatch) {
                        print(`[System is waiting for you to press '${keyMatch[1]}']`, 'highlight');
                        await waitForKey(keyMatch[1]);
                        ip++; continue;
                    }

                    let waitMatch = line.match(/^wait (\d+) seconds?$/);
                    if (waitMatch) {
                        await sleep(Number(waitMatch[1]) * 1000);
                        ip++; continue;
                    }

                    let setMatch = line.match(/^set (number|string|boolean) (\w+) to (.+)$/);
                    if (setMatch) {
                        variables[setMatch[2]] = { type: setMatch[1], value: getValue(setMatch[3]) };
                        ip++; continue;
                    }

                    if (line.startsWith('print ')) {
                        print(getValue(line.substring(6)));
                        ip++; continue;
                    }

                    let ifMatch = line.match(/^if (.+) is (equal to|greater than|less than) (.+)$/);
                    if (ifMatch) {
                        let v1 = getValue(ifMatch[1]), op = ifMatch[2], v2 = getValue(ifMatch[3]);
                        let isTrue = (op === "equal to" && v1 === v2) || (op === "greater than" && v1 > v2) || (op === "less than" && v1 < v2);
                        if (!isTrue) {
                            let depth = 1;
                            while (depth > 0) {
                                ip++;
                                if (ip >= lines.length) throw new Error("Missing 'end if'");
                                if (lines[ip].trim().startsWith("if ")) depth++;
                                if (lines[ip].trim() === "end if") depth--;
                            }
                        }
                        ip++; continue;
                    }
                    if (line === "end if") { ip++; continue; }

                    throw new Error(`Unrecognized command: '${line}'`);
                }
                
                print("--- Program Finished ---", 'system');
            } catch (err) {
                print(`Error on line ${ip + 1}: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
