<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E# Language Playground - Async Edition</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        h1 { margin-top: 0; color: #c586c0; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .panel-header { background: #3c3c3c; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        textarea { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; resize: none; outline: none; line-height: 1.4; }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; color: #a5d6ff; white-space: pre-wrap; }
        button { background: #c586c0; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #a864a3; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        .error { color: #ff7b72; }
        .success { color: #7ee787; }
        .system { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <h1>E# Playground</h1>
    <p>Now featuring Asynchronous Timers and Custom Actions!</p>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span>Program.e#</span>
                <button id="runBtn" onclick="startExecution()">Run Program</button>
            </div>
            <textarea id="editor" spellcheck="false">
// Define a custom action (like a C# Method)
define action blastoff
    print "🚀 Liftoff! We have liftoff!"
end action

set number countdown to 3
print "Starting launch sequence..."

while countdown is greater than 0
    print countdown
    wait 1 second
    subtract 1 from countdown
end while

// Call our custom action
call blastoff
            </textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Live Terminal</div>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // A helper function to pause JavaScript execution
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function startExecution() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.innerText = "Running...";
            
            await runESharp();
            
            runBtn.disabled = false;
            runBtn.innerText = "Run Program";
        }

        async function runESharp() {
            const code = document.getElementById('editor').value;
            const consoleOut = document.getElementById('console');
            consoleOut.innerHTML = '';
            
            let variables = {};
            let actions = {};
            let lines = code.split('\n');
            let ip = 0; // Instruction Pointer
            let loopStack = [];
            let callStack = []; // Remembers where to return after a function call

            function print(text, type = 'normal') {
                const span = document.createElement('div');
                span.textContent = text;
                if (type === 'error') span.className = 'error';
                if (type === 'system') span.className = 'system';
                if (type === 'success') span.className = 'success';
                consoleOut.appendChild(span);
                consoleOut.scrollTop = consoleOut.scrollHeight; // Auto-scroll to bottom
            }

            function getValue(valStr) {
                valStr = valStr.trim();
                if (valStr === "true") return true;
                if (valStr === "false") return false;
                if (!isNaN(valStr)) return Number(valStr);
                if (valStr.startsWith('"') && valStr.endsWith('"')) return valStr.substring(1, valStr.length - 1);
                if (variables[valStr] !== undefined) return variables[valStr].value;
                throw new Error(`Unknown variable or value: '${valStr}'`);
            }

            try {
                print("--- Compiling... ---", 'system');
                
                // First Pass: Find all actions (functions) so they can be called from anywhere
                for (let i = 0; i < lines.length; i++) {
                    let match = lines[i].trim().match(/^define action (\w+)$/);
                    if (match) actions[match[1]] = i + 1;
                }

                print("--- Running ---", 'success');

                // Second Pass: Execution (Now fully Asynchronous!)
                while (ip < lines.length) {
                    let line = lines[ip].trim();
                    
                    if (!line || line.startsWith('//')) { ip++; continue; }

                    // --- TIMERS ---
                    let waitMatch = line.match(/^wait (\d+) seconds?$/);
                    if (waitMatch) {
                        let seconds = Number(waitMatch[1]);
                        await sleep(seconds * 1000); // Pause execution here!
                        ip++; continue;
                    }

                    // --- ACTIONS (Functions) ---
                    // If we stumble upon a definition normally, skip over it
                    let defMatch = line.match(/^define action (\w+)$/);
                    if (defMatch) {
                        let depth = 1;
                        while (depth > 0) {
                            ip++;
                            if (ip >= lines.length) throw new Error("Missing 'end action'");
                            if (lines[ip].trim().startsWith("define action ")) depth++;
                            if (lines[ip].trim() === "end action") depth--;
                        }
                        ip++; continue;
                    }

                    let callMatch = line.match(/^call (\w+)$/);
                    if (callMatch) {
                        let actionName = callMatch[1];
                        if (actions[actionName] !== undefined) {
                            callStack.push(ip + 1); // Remember where to come back to
                            ip = actions[actionName]; // Jump to the action
                            continue;
                        } else {
                            throw new Error(`Action '${actionName}' is not defined.`);
                        }
                    }

                    if (line === "end action") {
                        if (callStack.length === 0) throw new Error("'end action' reached without being called.");
                        ip = callStack.pop(); // Jump back to where we called it from
                        continue;
                    }

                    // --- STANDARD C# LOGIC ---
                    let setMatch = line.match(/^set (number|string|boolean) (\w+) to (.+)$/);
                    if (setMatch) {
                        let type = setMatch[1], name = setMatch[2], val = getValue(setMatch[3]);
                        variables[name] = { type, value: val };
                        ip++; continue;
                    }

                    if (line.startsWith('print ')) {
                        print(getValue(line.substring(6)));
                        ip++; continue;
                    }

                    let subMatch = line.match(/^subtract (.+) from (\w+)$/);
                    if (subMatch) {
                        variables[subMatch[2]].value -= getValue(subMatch[1]);
                        ip++; continue;
                    }
                    
                    let addMatch = line.match(/^add (.+) to (\w+)$/);
                    if (addMatch) {
                        variables[addMatch[2]].value += getValue(addMatch[1]);
                        ip++; continue;
                    }

                    let whileMatch = line.match(/^while (.+) is (equal to|greater than|less than) (.+)$/);
                    if (whileMatch) {
                        let v1 = getValue(whileMatch[1]), op = whileMatch[2], v2 = getValue(whileMatch[3]);
                        let isTrue = (op === "equal to" && v1 === v2) || (op === "greater than" && v1 > v2) || (op === "less than" && v1 < v2);

                        if (isTrue) {
                            loopStack.push(ip);
                            ip++;
                        } else {
                            let depth = 1;
                            while (depth > 0) {
                                ip++;
                                if (ip >= lines.length) throw new Error("Missing 'end while'");
                                if (lines[ip].trim().startsWith("while ")) depth++;
                                if (lines[ip].trim() === "end while") depth--;
                            }
                            ip++;
                        }
                        continue;
                    }
                    
                    if (line === "end while") {
                        if (loopStack.length === 0) throw new Error("'end while' found without a 'while'");
                        ip = loopStack.pop();
                        continue;
                    }

                    throw new Error(`Unrecognized command: '${line}'`);
                }
                
                print("--- Program Finished ---", 'system');
            } catch (err) {
                print(`Error on line ${ip + 1}: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
