<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E# Language Playground - Engine Edition</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; color: #ff5e5e; }
        .docs-btn { background: #3c3c3c; color: #fff; border: 1px solid #555; padding: 8px 16px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .docs-btn:hover { background: #555; }
        
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        .editor-panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .panel-header { background: #3c3c3c; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        button.secondary-btn { background: #444; color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; transition: 0.2s; }
        button.secondary-btn:hover { background: #555; }
        
        button.run-btn { background: #ff5e5e; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button.run-btn:hover { background: #e04848; }
        button.run-btn:disabled { background: #555; cursor: not-allowed; color: #888; }

        .editor-wrapper { display: flex; flex: 1; overflow: hidden; background: #1e1e1e; }
        .line-numbers { padding: 15px 10px; background: #1e1e1e; color: #5a5a5a; font-family: 'Courier New', Courier, monospace; font-size: 15px; line-height: 1.4; text-align: right; border-right: 1px solid #333; user-select: none; overflow: hidden; }
        textarea { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 15px; resize: none; outline: none; line-height: 1.4; white-space: pre; overflow-x: auto; }
        
        #autocomplete-bar { background: #252526; padding: 6px 15px; border-top: 1px solid #444; display: flex; gap: 10px; font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #888; overflow-x: auto; align-items: center; }
        .suggestion { background: #3c3c3c; padding: 2px 8px; border-radius: 4px; color: #d4d4d4; }
        .suggestion.active { background: #04395e; border: 1px solid #007fd4; color: #fff; font-weight: bold; }
        .suggestion-hint { font-style: italic; color: #666; margin-right: 5px; }

        #linter-bar { padding: 8px 15px; font-size: 14px; font-weight: bold; font-family: 'Courier New', Courier, monospace; border-top: 1px solid #444; }
        .linter-good { background: #238636; color: #fff; }
        .linter-bad { background: #da3633; color: #fff; }

        .right-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .canvas-panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        canvas { background-color: #111; border: 1px solid #333; outline: none; }
        canvas:focus { border: 1px solid #ff5e5e; }
        
        .tabs-panel { flex: 1; display: flex; flex-direction: column; background: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        .tab-buttons { display: flex; background: #1e1e1e; border-bottom: 1px solid #444; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #888; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: #ff5e5e; border-bottom: 2px solid #ff5e5e; background: #2d2d2d; }
        .tab-content { flex: 1; display: none; overflow: hidden; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        #console { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; color: #a5d6ff; white-space: pre-wrap; display: flex; flex-direction: column; }
        
        .map-editor { flex: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; overflow-y: auto; }
        .palette { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .palette-btn { font-size: 24px; background: none; border: 2px solid transparent; cursor: pointer; border-radius: 4px; padding: 2px; }
        .palette-btn.selected { border: 2px solid #ff5e5e; background: #444; }
        
        #map-grid { display: grid; grid-template-columns: repeat(13, 25px); grid-template-rows: repeat(8, 25px); gap: 1px; background: #444; border: 2px solid #555; }
        .grid-cell { background: #111; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; user-select: none; }
        
        #sprite-grid { display: grid; grid-template-columns: repeat(8, 30px); grid-template-rows: repeat(8, 30px); gap: 1px; background: #444; border: 2px solid #555; }
        .sprite-cell { background: #111; cursor: pointer; user-select: none; }
        .color-btn { width: 30px; height: 30px; border: 2px solid #444; cursor: pointer; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .color-btn.selected { border: 2px solid #fff; transform: scale(1.1); }
        .color-R { background: #ff5e5e; } .color-G { background: #238636; } .color-B { background: #007fd4; }
        .color-Y { background: #e3b341; } .color-W { background: #ffffff; } .color-K { background: #333; }
        .color-eraser { background: #2d2d2d; }
        
        .export-btn { margin-top: 15px; background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .error { color: #ff7b72; }
        .system { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>E# Playground</h1>
        <a href="docs.html" target="_blank" class="docs-btn">View E# Documentation</a>
    </div>

    <div class="container">
        <div class="editor-panel">
            <div class="panel-header">
                <span>Program.e#</span>
                <div>
                    <button class="secondary-btn" onclick="saveCode()">💾 Save</button>
                    <button class="secondary-btn" onclick="loadCode()">📂 Load</button>
                    <button id="runBtn" class="run-btn" onclick="startExecution()">Run Program</button>
                </div>
            </div>
            
            <div class="editor-wrapper">
                <div id="line-numbers" class="line-numbers">1</div>
                <textarea id="editor" spellcheck="false" wrap="off">
print "Spawners & Buttons Online!"

create pixelart bulletSprite
    "........"
    "........"
    "..WWWW.."
    ".WWWWWW."
    "..WWWW.."
    "........"
    "........"
    "........"
end pixelart

set object player to "🚀" at x 180 y 250
set player's scale to 1.5

// 1. Create a button and an empty object group!
create button fireBtn text "FIRE!" at x 10 y 10 width 80 height 30
create group bullets

set boolean gameIsRunning to true

while gameIsRunning is true
    clear canvas
    
    // Draw our interactive UI
    draw button fireBtn
    
    // 2. Check for button clicks to spawn!
    if you clicked fireBtn
        spawn using bulletSprite into bullets at x player's x y player's y
    end if
    
    if you pressed "space"
        spawn using bulletSprite into bullets at x player's x y player's y
    end if
    
    // 3. Move EVERY bullet in the group
    for each b in bullets
        subtract 10 from b's y
        draw object b
        
        // Destroy bullets that go off screen to save memory
        if b's y is less than 0
            remove b from bullets
        end if
    end for
    
    // Player controls
    if you pressed "arrow right"
        add 5 to player's x
    end if
    if you pressed "arrow left"
        subtract 5 from player's x
    end if
    
    draw object player
    wait 30 milliseconds
end while
end program
</textarea>
            </div>
            <div id="autocomplete-bar">
                <span class="suggestion-hint">Start typing for suggestions...</span>
            </div>
            <div id="linter-bar" class="linter-good">Syntax OK - Ready to Run</div>
        </div>

        <div class="right-column">
            <div class="canvas-panel">
                <div class="panel-header">Game Canvas (Click to focus)</div>
                <div class="canvas-container">
                    <canvas id="gameCanvas" width="400" height="300" tabindex="0"></canvas>
                </div>
            </div>

            <div class="tabs-panel">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('terminal')">Live Terminal</button>
                    <button class="tab-btn" onclick="switchTab('mapeditor')">Tilemap</button>
                    <button class="tab-btn" onclick="switchTab('spriteeditor')">Sprite Editor</button>
                </div>
                
                <div id="tab-terminal" class="tab-content active">
                    <div id="console" tabindex="0"></div>
                </div>

                <div id="tab-mapeditor" class="tab-content">
                    <div class="map-editor">
                        <div class="palette">
                            <button class="palette-btn selected" onclick="selectTile('🟩')">🟩</button>
                            <button class="palette-btn" onclick="selectTile('🟥')">🟥</button>
                            <button class="palette-btn" onclick="selectTile('🟫')">🟫</button>
                            <button class="palette-btn" onclick="selectTile('🟦')">🟦</button>
                            <button class="palette-btn" onclick="selectTile('⬛')">⬛</button>
                            <button class="palette-btn" onclick="selectTile('#')">#</button>
                        </div>
                        <div id="map-grid"></div>
                        <button class="export-btn" onclick="exportMap()">Copy Map Code</button>
                    </div>
                </div>

                <div id="tab-spriteeditor" class="tab-content">
                    <div class="map-editor">
                        <div class="palette">
                            <button class="color-btn color-R selected" onclick="selectPixelColor('R', this)"></button>
                            <button class="color-btn color-G" onclick="selectPixelColor('G', this)"></button>
                            <button class="color-btn color-B" onclick="selectPixelColor('B', this)"></button>
                            <button class="color-btn color-Y" onclick="selectPixelColor('Y', this)"></button>
                            <button class="color-btn color-W" onclick="selectPixelColor('W', this)"></button>
                            <button class="color-btn color-K" onclick="selectPixelColor('K', this)"></button>
                            <div style="width: 1px; height: 30px; background: #555; margin: 0 5px;"></div>
                            <button class="color-btn color-eraser" onclick="selectPixelColor('.', this)" title="Eraser">🧽</button>
                        </div>
                        <div id="sprite-grid"></div>
                        <button class="export-btn" onclick="exportSprite()">Copy Sprite Code</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- UI & TABS ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // --- IDE FEATURES ---
        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('line-numbers');
        const autocompleteBar = document.getElementById('autocomplete-bar');
        
        const engineKeywords = [
            "create", "tilemap", "pixelart", "function", "end", "set", "object", "number", "string", "boolean", "vector2",
            "group", "spawn", "using", "into", "for", "each", "in", "remove", "from", "button", "text", "width", "height", "clicked",
            "to", "at", "x", "y", "scale", "rotation", "clear", "canvas", "draw", "sprite", "run", "if", "while", 
            "is", "true", "false", "raycast", "hits", "does", "not", "hit", "move", 
            "towards", "by", "wait", "milliseconds", "seconds", "you", "pressed", "touching", "tile",
            "print", "add", "subtract", "multiply", "divide", "color"
        ];
        
        let customVariables = new Set();
        let currentSuggestions = [];
        let currentWord = "";
        let wordStartIndex = 0;

        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
        }
        
        editor.addEventListener('scroll', () => { lineNumbers.scrollTop = editor.scrollTop; });

        function extractCurrentWord() {
            const cursorPosition = editor.selectionStart;
            const textToCursor = editor.value.substring(0, cursorPosition);
            const words = textToCursor.split(/[\s\n]+/);
            currentWord = words[words.length - 1];
            wordStartIndex = cursorPosition - currentWord.length;
        }

        function updateAutocomplete() {
            extractCurrentWord();
            autocompleteBar.innerHTML = '';
            currentSuggestions = [];

            if (currentWord.length > 0) {
                let allWords = Array.from(new Set([...engineKeywords, ...customVariables]));
                currentSuggestions = allWords.filter(word => 
                    word.toLowerCase().startsWith(currentWord.toLowerCase()) && word.toLowerCase() !== currentWord.toLowerCase()
                ).slice(0, 5); 
            }

            if (currentSuggestions.length > 0) {
                const hint = document.createElement('span'); hint.className = 'suggestion-hint'; hint.innerText = 'Press TAB:';
                autocompleteBar.appendChild(hint);
                currentSuggestions.forEach((sugg, index) => {
                    const span = document.createElement('span'); span.className = 'suggestion' + (index === 0 ? ' active' : '');
                    span.innerText = sugg; autocompleteBar.appendChild(span);
                });
            } else { autocompleteBar.innerHTML = '<span class="suggestion-hint">Typing...</span>'; }
        }

        editor.addEventListener('input', () => { updateLineNumbers(); updateAutocomplete(); checkSyntax(); });

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                if (currentSuggestions.length > 0) {
                    const before = editor.value.substring(0, wordStartIndex);
                    const after = editor.value.substring(editor.selectionStart);
                    const suggestion = currentSuggestions[0];
                    editor.value = before + suggestion + " " + after;
                    editor.selectionStart = editor.selectionEnd = wordStartIndex + suggestion.length + 1;
                    updateAutocomplete(); checkSyntax();
                } else {
                    const start = editor.selectionStart; const end = editor.selectionEnd;
                    editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 4;
                }
            }
        });

        updateLineNumbers();

        // --- MAP EDITOR & SPRITE EDITOR ---
        let currentTile = '🟩';
        const mapGrid = document.getElementById('map-grid');
        function selectTile(emoji) { currentTile = emoji; document.querySelectorAll('.palette-btn').forEach(btn => btn.classList.remove('selected')); event.target.classList.add('selected'); }
        let isDrawing = false;
        for (let i = 0; i < 13 * 8; i++) {
            let cell = document.createElement('div'); cell.className = 'grid-cell'; cell.innerText = '🟩';
            cell.addEventListener('mousedown', (e) => { isDrawing = true; e.target.innerText = currentTile; });
            cell.addEventListener('mouseenter', (e) => { if (isDrawing) e.target.innerText = currentTile; });
            mapGrid.appendChild(cell);
        }
        document.addEventListener('mouseup', () => { isDrawing = false; isSpriteDrawing = false; });
        function exportMap() {
            let cells = document.querySelectorAll('.grid-cell'); let output = "create tilemap myLevel\n";
            for(let r=0; r<8; r++) { let rowStr = '    "'; for(let c=0; c<13; c++) { rowStr += cells[r * 13 + c].innerText; } rowStr += '"\n'; output += rowStr; }
            output += "end tilemap"; navigator.clipboard.writeText(output); alert("Map copied! Paste it into your code.");
        }

        let currentPixel = 'R';
        const spriteGrid = document.getElementById('sprite-grid'); let spriteCells = [];
        function selectPixelColor(colorChar, btnElement) { currentPixel = colorChar; document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected')); btnElement.classList.add('selected'); }
        let isSpriteDrawing = false;
        const pColors = {'R':'#ff5e5e','G':'#238636','B':'#007fd4','Y':'#e3b341','W':'#ffffff','K':'#333','.':'transparent'};
        for (let i = 0; i < 8 * 8; i++) {
            let cell = document.createElement('div'); cell.className = 'sprite-cell'; cell.dataset.char = '.';
            function applyPixel(el) { el.dataset.char = currentPixel; el.style.backgroundColor = currentPixel === '.' ? 'transparent' : pColors[currentPixel]; }
            cell.addEventListener('mousedown', (e) => { isSpriteDrawing = true; applyPixel(e.target); });
            cell.addEventListener('mouseenter', (e) => { if (isSpriteDrawing) applyPixel(e.target); });
            spriteCells.push(cell); spriteGrid.appendChild(cell);
        }
        function exportSprite() {
            let output = "create pixelart mySprite\n";
            for(let r=0; r<8; r++) { let rowStr = '    "'; for(let c=0; c<8; c++) { rowStr += spriteCells[r * 8 + c].dataset.char; } rowStr += '"\n'; output += rowStr; }
            output += "end pixelart"; navigator.clipboard.writeText(output); alert("Sprite copied! Paste it into your code.");
        }

        // --- ENGINE ---
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        const linterBar = document.getElementById('linter-bar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const activeKeys = new Set();
        
        let mouseX = 0, mouseY = 0, mouseJustPressed = false, mouseIsDown = false;
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        canvas.addEventListener('mousedown', () => { 
            if(!mouseIsDown) { mouseJustPressed = true; mouseIsDown = true; } 
        });
        canvas.addEventListener('mouseup', () => { mouseIsDown = false; });
        
        canvas.addEventListener('keydown', (e) => {
            let keyName = e.key.toLowerCase();
            if (keyName === "arrowup") keyName = "arrow up"; if (keyName === "arrowdown") keyName = "arrow down";
            if (keyName === "arrowleft") keyName = "arrow left"; if (keyName === "arrowright") keyName = "arrow right";
            if (keyName === " ") keyName = "space";
            activeKeys.add(keyName);
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.code) > -1) e.preventDefault();
        });
        canvas.addEventListener('keyup', (e) => {
            let keyName = e.key.toLowerCase();
            if (keyName === "arrowup") keyName = "arrow up"; if (keyName === "arrowdown") keyName = "arrow down";
            if (keyName === "arrowleft") keyName = "arrow left"; if (keyName === "arrowright") keyName = "arrow right";
            if (keyName === " ") keyName = "space";
            activeKeys.delete(keyName);
        });

        function checkSyntax() {
            const lines = editor.value.split('\n');
            let hasError = false; let inTilemap = false; let inPixelArt = false;
            customVariables.clear();

            for (let i = 0; i < lines.length; i++) {
                let funcMatch = lines[i].trim().match(/^create function (\w+)$/);
                if (funcMatch) customVariables.add(funcMatch[1]);
            }

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line || line.startsWith('//')) continue;

                let isValidCommand = false;

                if (inTilemap) {
                    if (line === "end tilemap") inTilemap = false; isValidCommand = true; 
                } 
                else if (inPixelArt) {
                    if (line === "end pixelart") inPixelArt = false; isValidCommand = true; 
                }
                else if (line.match(/^create tilemap (\w+)$/)) { customVariables.add(line.match(/^create tilemap (\w+)$/)[1]); inTilemap = true; isValidCommand = true; }
                else if (line.match(/^create pixelart (\w+)$/)) { customVariables.add(line.match(/^create pixelart (\w+)$/)[1]); inPixelArt = true; isValidCommand = true; }
                
                // --- NEW UI & GROUPS LINTER RULES ---
                else if (line.match(/^create group (\w+)$/)) { customVariables.add(line.match(/^create group (\w+)$/)[1]); isValidCommand = true; }
                else if (line.match(/^create button (\w+) text "([^"]+)" at x (.+) y (.+) width (.+) height (.+)$/)) { customVariables.add(line.match(/^create button (\w+)/)[1]); isValidCommand = true; }
                else if (line.match(/^draw button (\w+)$/)) isValidCommand = true;
                else if (line.match(/^if you clicked (\w+)$/)) isValidCommand = true;
                else if (line.match(/^spawn using (\w+) into (\w+) at x (.+) y (.+)$/)) isValidCommand = true;
                else if (line.match(/^for each (\w+) in (\w+)$/)) { customVariables.add(line.match(/^for each (\w+) in (\w+)$/)[1]); isValidCommand = true; }
                else if (line === "end for") isValidCommand = true;
                else if (line.match(/^remove (\w+) from (\w+)$/)) isValidCommand = true;
                
                else if (line.match(/^set vector2 (\w+) to x (.+) y (.+)$/)) { customVariables.add(line.match(/^set vector2 (\w+) to x (.+) y (.+)$/)[1]); isValidCommand = true; }
                else if (line.match(/^draw tilemap (\w+) at x (.+) y (.+)$/)) isValidCommand = true;
                else if (line.match(/^play sound "(.+)"$/)) isValidCommand = true;
                else if (line.match(/^if (\w+) is touching tile "([^"]+)" in (\w+)$/)) isValidCommand = true;
                else if (line.match(/^if raycast from (\w+) to (\w+) (hits|does not hit) "([^"]+)" in (\w+)$/)) isValidCommand = true;
                
                else if (line.match(/^set (\w+)'s (x|y|scale|rotation) to (.+)$/)) isValidCommand = true;
                else if (line.match(/^set (\w+) to (.+)$/)) isValidCommand = true;
                else if (line.match(/^set color to "([^"]+)"$/)) isValidCommand = true;

                else {
                    let setMatch = line.match(/^set (number|string|boolean) (\w+) to (.+)$/);
                    let randomMatch = line.match(/^set number (\w+) to random between (\d+) and (\d+)$/);
                    let combineMatch = line.match(/^combine (.+) and (.+) into (\w+)$/);
                    let setObjMatch = line.match(/^set object (\w+) to (.+) at x (.+) y (.+)$/);
                    
                    if (setMatch) { customVariables.add(setMatch[2]); isValidCommand = true; }
                    else if (randomMatch) { customVariables.add(randomMatch[1]); isValidCommand = true; }
                    else if (combineMatch) { customVariables.add(combineMatch[3]); isValidCommand = true; }
                    else if (setObjMatch) { customVariables.add(setObjMatch[1]); isValidCommand = true; }
                    
                    else if (line.startsWith('print ')) isValidCommand = true;
                    
                    else if (line.match(/^add (.+) to (\w+)$/)) isValidCommand = true;
                    else if (line.match(/^subtract (.+) from (\w+)$/)) isValidCommand = true;
                    else if (line.match(/^multiply (\w+) by (.+)$/)) isValidCommand = true;
                    else if (line.match(/^divide (\w+) by (.+)$/)) isValidCommand = true;
                    
                    else if (line.match(/^add (.+) to (\w+)'s (x|y|scale|rotation)$/)) isValidCommand = true;
                    else if (line.match(/^subtract (.+) from (\w+)'s (x|y|scale|rotation)$/)) isValidCommand = true;
                    else if (line.match(/^multiply (\w+)'s (x|y|scale|rotation) by (.+)$/)) isValidCommand = true;
                    else if (line.match(/^divide (\w+)'s (x|y|scale|rotation) by (.+)$/)) isValidCommand = true;
                    
                    else if (line.match(/^move (\w+) towards (\w+) by (\d+)$/)) isValidCommand = true;
                    else if (line.match(/^draw object (\w+)$/)) isValidCommand = true;
                    else if (line.match(/^draw text (.+) at x (.+) y (.+)$/)) isValidCommand = true;
                    else if (line === "clear canvas" || line === "clear terminal" || line === "end program" || line === "end if" || line === "end while") isValidCommand = true;
                    else if (line.match(/^wait (\d+) seconds?$/)) isValidCommand = true;
                    else if (line.match(/^wait (\d+) milliseconds?$/)) isValidCommand = true;
                    else if (line.match(/^if you pressed "(.+)"$/)) isValidCommand = true;
                    else if (line.match(/^if (.+) is (true|false)$/)) isValidCommand = true; 
                    else if (line.match(/^if (.+) is (equal to|greater than|less than) (.+)$/)) isValidCommand = true;
                    else if (line.match(/^if (\w+) is touching (\w+)$/)) isValidCommand = true;
                    else if (line.match(/^while (.+) is (equal to|greater than|less than) (.+)$/)) isValidCommand = true;
                    else if (line.match(/^while (.+) is (true|false)$/)) isValidCommand = true;
                    else if (line.match(/^create function (\w+)$/)) isValidCommand = true;
                    else if (line === "end function") isValidCommand = true;
                    else if (line.match(/^run (\w+)$/)) isValidCommand = true;
                }

                if (!isValidCommand) { showError(i + 1, `Unrecognized command: '${line}'`); hasError = true; break; }
            }
            if (!hasError) { linterBar.className = 'linter-good'; linterBar.textContent = 'Syntax OK - Ready to Run'; document.getElementById('runBtn').disabled = false; }
        }

        function showError(lineNumber, message) { linterBar.className = 'linter-bad'; linterBar.textContent = `Error on Line ${lineNumber}: ${message}`; document.getElementById('runBtn').disabled = true; }

        let isRunning = false; 

        async function startExecution() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true; runBtn.innerText = "Running...";
            ctx.clearRect(0, 0, canvas.width, canvas.height); activeKeys.clear(); canvas.focus(); isRunning = true; mouseJustPressed = false;
            await runESharp();
            runBtn.disabled = false; runBtn.innerText = "Run Program"; isRunning = false;
        }

        async function runESharp() {
            const code = document.getElementById('editor').value; const consoleOut = document.getElementById('console'); consoleOut.innerHTML = '';
            let variables = {}; let lines = code.split('\n'); let ip = 0; let functions = {}; let callStack = []; let forStacks = []; let currentColor = '#ffffff';

            for(let j=0; j<lines.length; j++) {
                let funcMatch = lines[j].trim().match(/^create function (\w+)$/);
                if (funcMatch) functions[funcMatch[1]] = j;
            }

            function print(text, type = 'normal') {
                const span = document.createElement('div'); span.textContent = text;
                if (type === 'error') span.className = 'error'; if (type === 'system') span.className = 'system';
                consoleOut.appendChild(span); consoleOut.scrollTop = consoleOut.scrollHeight;
            }

            function getValue(valStr) {
                valStr = valStr.trim();
                if (valStr === "true") return true; if (valStr === "false") return false;
                if (!isNaN(valStr)) return Number(valStr);
                if (valStr.startsWith('"') && valStr.endsWith('"')) return valStr.substring(1, valStr.length - 1);
                
                if (valStr.endsWith("'s x")) { let obj = valStr.replace("'s x", ""); return variables[obj].x; }
                if (valStr.endsWith("'s y")) { let obj = valStr.replace("'s y", ""); return variables[obj].y; }
                if (valStr.endsWith("'s scale")) { let obj = valStr.replace("'s scale", ""); return variables[obj].scale; }
                if (valStr.endsWith("'s rotation")) { let obj = valStr.replace("'s rotation", ""); return variables[obj].rotation; }

                if (variables[valStr] !== undefined) {
                    if (['pixelart', 'object', 'vector2', 'button'].includes(variables[valStr].type)) return variables[valStr];
                    return variables[valStr].value;
                }
                throw new Error(`Unknown variable: '${valStr}'`);
            }

            try {
                print("--- Program Running ---", 'system');

                while (ip < lines.length && isRunning) {
                    let line = lines[ip].trim();
                    if (!line || line.startsWith('//')) { ip++; continue; }
                    
                    // --- GROUPS AND SPAWNING LOGIC ---
                    let groupMatch = line.match(/^create group (\w+)$/);
                    if (groupMatch) { variables[groupMatch[1]] = { type: 'group', items: [] }; ip++; continue; }

                    let spawnMatch = line.match(/^spawn using (\w+) into (\w+) at x (.+) y (.+)$/);
                    if (spawnMatch) {
                        let spriteData = getValue(spawnMatch[1]);
                        variables[spawnMatch[2]].items.push({
                            type: 'object', sprite: spriteData,
                            x: getValue(spawnMatch[3]), y: getValue(spawnMatch[4]),
                            scale: 1, rotation: 0
                        });
                        ip++; continue;
                    }

                    let forEachMatch = line.match(/^for each (\w+) in (\w+)$/);
                    if (forEachMatch) {
                        let itemName = forEachMatch[1], groupName = forEachMatch[2], group = variables[groupName];
                        if (!group || group.type !== 'group') throw new Error(`'${groupName}' is not a valid group.`);
                        
                        if (group.items.length === 0) {
                            let depth = 1;
                            while (depth > 0) { ip++; if (lines[ip].trim().startsWith("for each ")) depth++; if (lines[ip].trim() === "end for") depth--; }
                            ip++; continue;
                        }

                        variables[itemName] = group.items[0];
                        forStacks.push({ startIp: ip, itemName: itemName, groupName: groupName, index: 0 });
                        ip++; continue;
                    }

                    if (line === "end for") {
                        if (forStacks.length === 0) throw new Error("Mismatched 'end for'");
                        let loop = forStacks[forStacks.length - 1];
                        loop.index++;
                        let group = variables[loop.groupName];
                        if (loop.index < group.items.length) {
                            variables[loop.itemName] = group.items[loop.index];
                            ip = loop.startIp + 1;
                            continue;
                        } else {
                            forStacks.pop(); ip++; continue;
                        }
                    }

                    let removeMatch = line.match(/^remove (\w+) from (\w+)$/);
                    if (removeMatch) {
                        let itemName = removeMatch[1], groupName = removeMatch[2], group = variables[groupName];
                        let idx = group.items.indexOf(variables[itemName]);
                        if (idx > -1) {
                            group.items.splice(idx, 1);
                            if (forStacks.length > 0) {
                                let currentLoop = forStacks[forStacks.length - 1];
                                if (currentLoop.groupName === groupName && currentLoop.index >= idx) { currentLoop.index--; }
                            }
                        }
                        ip++; continue;
                    }

                    // --- UI BUTTON LOGIC ---
                    let createBtnMatch = line.match(/^create button (\w+) text "([^"]+)" at x (.+) y (.+) width (.+) height (.+)$/);
                    if (createBtnMatch) {
                        variables[createBtnMatch[1]] = {
                            type: 'button', text: createBtnMatch[2],
                            x: getValue(createBtnMatch[3]), y: getValue(createBtnMatch[4]),
                            w: getValue(createBtnMatch[5]), h: getValue(createBtnMatch[6])
                        };
                        ip++; continue;
                    }

                    let drawBtnMatch = line.match(/^draw button (\w+)$/);
                    if (drawBtnMatch) {
                        let btn = variables[drawBtnMatch[1]];
                        ctx.fillStyle = '#444'; ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                        ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
                        ctx.fillStyle = '#fff'; ctx.font = '16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(btn.text, btn.x + btn.w/2, btn.y + btn.h/2);
                        ip++; continue;
                    }

                    let clickMatch = line.match(/^if you clicked (\w+)$/);
                    if (clickMatch) {
                        let btn = variables[clickMatch[1]];
                        let isClicking = mouseJustPressed && (mouseX >= btn.x && mouseX <= btn.x + btn.w && mouseY >= btn.y && mouseY <= btn.y + btn.h);
                        if (!isClicking) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("if ")) depth++; if (lines[ip].trim() === "end if") depth--; } }
                        ip++; continue;
                    }

                    let colorMatch = line.match(/^set color to "([^"]+)"$/);
                    if (colorMatch) { currentColor = colorMatch[1]; ip++; continue; }

                    let vecMatch = line.match(/^set vector2 (\w+) to x (.+) y (.+)$/);
                    if (vecMatch) { variables[vecMatch[1]] = { type: 'vector2', x: getValue(vecMatch[2]), y: getValue(vecMatch[3]) }; ip++; continue; }

                    let pixelArtMatch = line.match(/^create pixelart (\w+)$/);
                    if (pixelArtMatch) {
                        let name = pixelArtMatch[1]; let rows = []; let depth = 1;
                        while(depth > 0) { ip++; let tLine = lines[ip].trim(); if (tLine === "end pixelart") depth--; else if (tLine.startsWith('"') && tLine.endsWith('"')) rows.push(tLine.substring(1, tLine.length - 1)); }
                        variables[name] = { type: 'pixelart', rows: rows }; ip++; continue;
                    }

                    let mapCreateMatch = line.match(/^create tilemap (\w+)$/);
                    if (mapCreateMatch) {
                        let mapName = mapCreateMatch[1]; let mapRows = []; let depth = 1;
                        while(depth > 0) { ip++; let tLine = lines[ip].trim(); if (tLine === "end tilemap") depth--; else if (tLine.startsWith('"') && tLine.endsWith('"')) mapRows.push(tLine.substring(1, tLine.length - 1)); }
                        variables[mapName] = { type: 'tilemap', rows: mapRows, lastX: 0, lastY: 0 }; ip++; continue;
                    }

                    let drawMapMatch = line.match(/^draw tilemap (\w+) at x (.+) y (.+)$/);
                    if (drawMapMatch) {
                        let mapData = variables[drawMapMatch[1]]; mapData.lastX = getValue(drawMapMatch[2]); mapData.lastY = getValue(drawMapMatch[3]);
                        ctx.fillStyle = currentColor; ctx.font = '30px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                        for (let r = 0; r < mapData.rows.length; r++) { let chars = Array.from(mapData.rows[r]); for (let c = 0; c < chars.length; c++) { ctx.fillText(chars[c], mapData.lastX + (c * 30), mapData.lastY + (r * 30)); } }
                        ip++; continue;
                    }

                    let setPropMatch = line.match(/^set (\w+)'s (x|y|scale|rotation) to (.+)$/);
                    if (setPropMatch) { variables[setPropMatch[1]][setPropMatch[2]] = getValue(setPropMatch[3]); ip++; continue; }

                    let updateMatch = line.match(/^set (\w+) to (.+)$/);
                    if (updateMatch && !["number", "string", "boolean", "object", "vector2", "color"].includes(updateMatch[1])) {
                        let varName = updateMatch[1];
                        if (variables[varName]) { variables[varName].value = getValue(updateMatch[2]); } else { throw new Error(`Variable '${varName}' not found.`); }
                        ip++; continue;
                    }

                    let raycastMatch = line.match(/^if raycast from (\w+) to (\w+) (hits|does not hit) "([^"]+)" in (\w+)$/);
                    if (raycastMatch) {
                        let obj1 = variables[raycastMatch[1]], obj2 = variables[raycastMatch[2]], condition = raycastMatch[3], targetEmoji = raycastMatch[4], mapData = variables[raycastMatch[5]];
                        let startX = obj1.x + 15, startY = obj1.y + 15, endX = obj2.x + 15, endY = obj2.y + 15;
                        let dx = endX - startX, dy = endY - startY; let distance = Math.sqrt(dx*dx + dy*dy); let steps = Math.max(1, Math.floor(distance / 5)); let hitWall = false;
                        for (let i = 0; i <= steps; i++) {
                            let checkX = startX + (dx / steps) * i, checkY = startY + (dy / steps) * i;
                            let col = Math.floor((checkX - mapData.lastX) / 30), row = Math.floor((checkY - mapData.lastY) / 30);
                            if (row >= 0 && row < mapData.rows.length) { let chars = Array.from(mapData.rows[row]); if (col >= 0 && col < chars.length) { if (chars[col] === targetEmoji) { hitWall = true; break; } } }
                        }
                        let shouldRunBlock = (condition === "hits" && hitWall) || (condition === "does not hit" && !hitWall);
                        if (!shouldRunBlock) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("if ")) depth++; if (lines[ip].trim() === "end if") depth--; } }
                        ip++; continue;
                    }

                    let tileCollisionMatch = line.match(/^if (\w+) is touching tile "([^"]+)" in (\w+)$/);
                    if (tileCollisionMatch) {
                        let obj = variables[tileCollisionMatch[1]], targetEmoji = tileCollisionMatch[2], mapData = variables[tileCollisionMatch[3]];
                        let isTouching = false, tileSize = 30, objSize = 25 * obj.scale;
                        for (let r = 0; r < mapData.rows.length; r++) {
                            let chars = Array.from(mapData.rows[r]);
                            for (let c = 0; c < chars.length; c++) {
                                if (chars[c] === targetEmoji) {
                                    let tx = mapData.lastX + (c * tileSize), ty = mapData.lastY + (r * tileSize);
                                    if (obj.x < tx + tileSize && obj.x + objSize > tx && obj.y < ty + tileSize && obj.y + objSize > ty) { isTouching = true; break; }
                                }
                            }
                            if (isTouching) break;
                        }
                        if (!isTouching) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("if ")) depth++; if (lines[ip].trim() === "end if") depth--; } }
                        ip++; continue;
                    }

                    let playMatch = line.match(/^play sound "([^"]+)"$/);
                    if (playMatch) { new Audio(playMatch[1]).play().catch(e => {}); ip++; continue; }

                    let createFuncMatch = line.match(/^create function (\w+)$/);
                    if (createFuncMatch) { let depth = 1; while(depth > 0) { ip++; if (lines[ip].trim().startsWith("create function ")) depth++; if (lines[ip].trim() === "end function") depth--; } ip++; continue; }

                    if (line === "end function") { ip = callStack.pop(); ip++; continue; }
                    let runMatch = line.match(/^run (\w+)$/);
                    if (runMatch) { callStack.push(ip); ip = functions[runMatch[1]] + 1; continue; }

                    let setObjMatch = line.match(/^set object (\w+) to (.+) at x (.+) y (.+)$/);
                    if (setObjMatch) { variables[setObjMatch[1]] = { type: 'object', sprite: getValue(setObjMatch[2]), x: getValue(setObjMatch[3]), y: getValue(setObjMatch[4]), scale: 1, rotation: 0 }; ip++; continue; }

                    let drawObjMatch = line.match(/^draw object (\w+)$/);
                    if (drawObjMatch) {
                        let obj = variables[drawObjMatch[1]];
                        ctx.save(); 
                        if (typeof obj.sprite === 'string') {
                            ctx.translate(obj.x + 15, obj.y + 15); ctx.rotate((obj.rotation || 0) * Math.PI / 180); ctx.scale(obj.scale || 1, obj.scale || 1);
                            ctx.fillStyle = currentColor; ctx.font = '30px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText(obj.sprite, -15, -15);
                        } else if (obj.sprite && obj.sprite.type === 'pixelart') {
                            let pSize = 4; ctx.translate(obj.x + 16, obj.y + 16); ctx.rotate((obj.rotation || 0) * Math.PI / 180); ctx.scale(obj.scale || 1, obj.scale || 1);
                            for(let r=0; r<obj.sprite.rows.length; r++) {
                                let chars = obj.sprite.rows[r];
                                for(let c=0; c<chars.length; c++) { let p = chars[c]; if (p !== '.') { ctx.fillStyle = pColors[p] || currentColor; ctx.fillRect((c * pSize) - 16, (r * pSize) - 16, pSize, pSize); } }
                            }
                        }
                        ctx.restore(); ip++; continue;
                    }
                    
                    let drawTextMatch = line.match(/^draw text (.+) at x (.+) y (.+)$/);
                    if (drawTextMatch) { ctx.fillStyle = currentColor; ctx.font = '24px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText(getValue(drawTextMatch[1]), getValue(drawTextMatch[2]), getValue(drawTextMatch[3])); ip++; continue; }

                    let moveTowardMatch = line.match(/^move (\w+) towards (\w+) by (\d+)$/);
                    if (moveTowardMatch) {
                        let obj1 = variables[moveTowardMatch[1]], obj2 = variables[moveTowardMatch[2]], speed = Number(moveTowardMatch[3]);
                        let dx = obj2.x - obj1.x, dy = obj2.y - obj1.y; let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance > speed) { obj1.x += (dx / distance) * speed; obj1.y += (dy / distance) * speed; } else { obj1.x = obj2.x; obj1.y = obj2.y; }
                        ip++; continue;
                    }

                    let addMatch = line.match(/^add (.+) to (\w+)$/);
                    if (addMatch) {
                        let val = getValue(addMatch[1]); let target = variables[addMatch[2]];
                        if (target && ['object', 'vector2'].includes(target.type) && val && val.type === 'vector2') { target.x += val.x; target.y += val.y; } 
                        else if (target) { target.value += val; }
                        ip++; continue;
                    }
                    
                    let subMatch = line.match(/^subtract (.+) from (\w+)$/);
                    if (subMatch) {
                        let val = getValue(subMatch[1]); let target = variables[subMatch[2]];
                        if (target && ['object', 'vector2'].includes(target.type) && val && val.type === 'vector2') { target.x -= val.x; target.y -= val.y; } 
                        else if (target) { target.value -= val; }
                        ip++; continue;
                    }

                    let multMatch = line.match(/^multiply (\w+) by (.+)$/);
                    if (multMatch) { variables[multMatch[1]].value *= getValue(multMatch[2]); ip++; continue; }
                    let divMatch = line.match(/^divide (\w+) by (.+)$/);
                    if (divMatch) { variables[divMatch[1]].value /= getValue(divMatch[2]); ip++; continue; }

                    let objAddMatch = line.match(/^add (.+) to (\w+)'s (x|y|scale|rotation)$/);
                    if (objAddMatch) { variables[objAddMatch[2]][objAddMatch[3]] += Number(getValue(objAddMatch[1])); ip++; continue; }
                    let objSubMatch = line.match(/^subtract (.+) from (\w+)'s (x|y|scale|rotation)$/);
                    if (objSubMatch) { variables[objSubMatch[2]][objSubMatch[3]] -= Number(getValue(objSubMatch[1])); ip++; continue; }
                    let objMultMatch = line.match(/^multiply (\w+)'s (x|y|scale|rotation) by (.+)$/);
                    if (objMultMatch) { variables[objMultMatch[1]][objMultMatch[2]] *= Number(getValue(objMultMatch[3])); ip++; continue; }
                    let objDivMatch = line.match(/^divide (\w+)'s (x|y|scale|rotation) by (.+)$/);
                    if (objDivMatch) { variables[objDivMatch[1]][objDivMatch[2]] /= Number(getValue(objDivMatch[3])); ip++; continue; }

                    if (line === "clear canvas") { ctx.clearRect(0, 0, canvas.width, canvas.height); ip++; continue; }
                    if (line === "end program") { print("--- Program Terminated ---", 'system'); return; }

                    let waitMsMatch = line.match(/^wait (\d+) milliseconds?$/);
                    if (waitMsMatch) { 
                        mouseJustPressed = false; // Consume mouse clicks before sleep to prevent lingering clicks
                        await sleep(Number(waitMsMatch[1])); 
                        ip++; continue; 
                    }

                    let setMatch = line.match(/^set (number|string|boolean) (\w+) to (.+)$/);
                    if (setMatch) { variables[setMatch[2]] = { type: setMatch[1], value: getValue(setMatch[3]) }; ip++; continue; }
                    
                    if (line.startsWith('print ')) { print(getValue(line.substring(6))); ip++; continue; }

                    let pressedMatch = line.match(/^if you pressed "([^"]+)"$/);
                    if (pressedMatch) {
                        if (!activeKeys.has(pressedMatch[1].toLowerCase())) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("if ")) depth++; if (lines[ip].trim() === "end if") depth--; } }
                        ip++; continue;
                    }
                    
                    let touchMatch = line.match(/^if (\w+) is touching (\w+)$/);
                    if (touchMatch) {
                        let obj1 = variables[touchMatch[1]], obj2 = variables[touchMatch[2]];
                        let distance = Math.sqrt(Math.pow(obj1.x - obj2.x, 2) + Math.pow(obj1.y - obj2.y, 2));
                        if (distance >= 30) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("if ")) depth++; if (lines[ip].trim() === "end if") depth--; } }
                        ip++; continue;
                    }

                    if (line === "end if") { ip++; continue; }

                    let whileMatch = line.match(/^while (.+) is (true|false)$/);
                    if (whileMatch) {
                        if (getValue(whileMatch[1]) !== (whileMatch[2] === "true")) { let depth = 1; while (depth > 0) { ip++; if (lines[ip].trim().startsWith("while ")) depth++; if (lines[ip].trim() === "end while") depth--; } }
                        ip++; continue;
                    }
                    if (line === "end while") { let depth = 1; while (depth > 0) { ip--; if (lines[ip].trim() === "end while") depth++; if (lines[ip].trim().startsWith("while ")) depth--; } continue; }

                    throw new Error(`Unrecognized command: '${line}'`);
                }
                print("--- Program Finished ---", 'system');
            } catch (err) { print(`Error on line ${ip + 1}: ${err.message}`, 'error'); }
        }

        function saveCode() {
            localStorage.setItem('eSharpSavedCode', editor.value);
            const saveBtn = event.target; const originalText = saveBtn.innerText;
            saveBtn.innerText = "✅ Saved!"; saveBtn.style.background = "#238636";
            setTimeout(() => { saveBtn.innerText = originalText; saveBtn.style.background = "#444"; }, 1000);
        }

        function loadCode() {
            const savedCode = localStorage.getItem('eSharpSavedCode');
            if (savedCode) { editor.value = savedCode; updateLineNumbers(); checkSyntax(); } 
            else { alert("No saved code found in your browser!"); }
        }

        window.onload = () => {
            const savedCode = localStorage.getItem('eSharpSavedCode');
            if (savedCode) { editor.value = savedCode; updateLineNumbers(); checkSyntax(); }
        };
    </script>
</body>
</html>
