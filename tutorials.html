<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E# Tutorials</title>
    <style>
        /* Base page styling matching the E# engine */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            line-height: 1.6;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* The signature E# Red/Pink color for the main title */
        h1 {
            color: #ff5e5e;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            font-size: 2.5em;
        }

        h3 {
            color: #fff;
            margin-top: 30px;
            font-size: 1.5em;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        /* Styling the figure text to look like a real caption */
        .caption {
            font-size: 0.9em;
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 10px;
        }

        /* A placeholder box so you know where to put your screenshot */
        .image-placeholder {
            background-color: #2d2d2d;
            border: 1px dashed #555;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #888;
            margin-top: 25px;
        }
        /* Add this right below your .image-placeholder CSS */
        img {
            max-width: 100%;       /* Prevents the image from breaking the 800px limit */
            height: auto;          /* Keeps the aspect ratio from stretching */
            border-radius: 8px;    /* Gives it those nice rounded corners to match the IDE */
            border: 1px solid #444;/* Adds a subtle E# themed border */
            display: block;
            margin: 25px auto 0 auto; /* Centers the image and adds space above it */
        }
    </style>
</head>
<body>

    <h1>Welcome to E# Tutorials</h1>
    
    <h3>Introduction To E#</h3>
    <p>In my humble opinion, this is one of the easiest languages out there, so it should be easy to grasp.</p>
    <p>So the first thing you should do is get rid of all of the example code. Nothing should be there, nada!</p>
    
    <div class="image-placeholder">
        <img src="https://github.com/PuntiNugget/E-/blob/main/Screenshot%202026-03-13%209.41.16%20AM.png?raw=true" alt="Screenshot 2026-03-13 9.41.16 AM.png"/>
    </div>
    <p class="caption">Figure 1.0 - The empty E# playground</p>

</body>
</html>
